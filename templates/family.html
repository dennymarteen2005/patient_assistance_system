{% extends 'layout.html' %}
{% block content %}
<div class="dashboard-header">
    <h2>Family Portal</h2>
    <p>Messages from your loved one</p>
    <button onclick="initAudio(this)" class="btn" style="background:var(--primary);color:white">Enable Audio Alerts</button>
</div>

<div id="alerts-container" class="alerts-grid">
    <p class="text-muted">Loading alerts...</p>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const dashboardType = 'family';
    function filterAlerts(alert) {
        return alert.alert_type.toLowerCase() === 'call family member';
    }
</script>
{% endblock %}
